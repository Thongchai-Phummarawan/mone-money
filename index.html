async function pushAll() {
  if (!SESSION) return; document.getElementById('syncDot').className = 'sync-dot syncing';
  try {
    await SB.upsert('mm_profiles', { id: SESSION.user.id, name: PROFILE?.name || '', settings: DATA.settings, categories: DATA.categories, updated_at: new Date().toISOString() }, SESSION.access_token);

async function pullAll() {

const Auth = {

  showErr(msg) { const el = document.getElementById('authErr'); el.textContent = msg; el.classList.add('show'); },
  async login() {
    const email = document.getElementById('loginEmail').value.trim(); const pass = document.getElementById('loginPass').value;
    if (!email||!pass) return; const res = await SB.signIn(email, pass);
    if (res.error || !res.access_token) { this.showErr('ข้อมูลเข้าสู่ระบบไม่ถูกต้อง'); return; }
    SESSION = { access_token: res.access_token, user: res.user };
    localStorage.setItem(LSK, JSON.stringify({ token: res.access_token, uid: res.user.id }));
    await pullAll(); this.startApp();
  },
  startApp() {
    document.getElementById('authScreen').style.display='none'; document.getElementById('appWrap').style.display='block';
    if (!DATA.categories.length) Onboard.start(); else App.showApp();
  }
};

  }
};

const DEFAULT_CATS = [{id:'c_food',name:'อาหาร',icon:'🍱'},{id:'c_other',name:'อื่นๆ',icon:'🔖'}];

const App = {
  tab: 'dashboard', pend: {type:'expense',amount:'0',cat:null},
  showApp() {
    document.getElementById('onboardArea').style.display='none'; document.getElementById('appViews').style.display='block'; document.getElementById('bnav').style.display='grid';
    document.querySelectorAll('.nb').forEach(b=>b.addEventListener('click',()=>this.go(b.dataset.tab))); this.go('dashboard');
  },
  go(tab) { this.tab=tab; document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('view-'+tab)?.classList.add('active'); this.render(); },
  render() { if(this.tab==='dashboard') this.rDash(); else if(this.tab==='add') this.rAdd(); else if(this.tab==='settings') this.rSettings(); },
  rDash() {
    const v=document.getElementById('view-dashboard'); const {inc,exp,net}=mSum(curM()); const sav=calcSavings();
    v.innerHTML=`<div class="kgrid">
      <div class="kpi hero"><div class="lbl">💰 เงินเก็บสะสม (ซิงค์ Cloud)</div><div class="val">${fmt(sav)}</div></div>
      <div class="kpi"><div class="lbl">รายรับเดือนนี้</div><div class="val c-grn">${fmt(inc)}</div></div>
      <div class="kpi"><div class="lbl">รายจ่ายเดือนนี้</div><div class="val c-red">${fmt(exp)}</div></div>
    </div>
    <div class="ai-panel">
      <div class="ai-hdr"><div class="ai-avatar">🤖</div><div class="ai-name">Mona — Local AI Advisor (ไม่ต้องใช้คีย์)</div></div>
      <div class="ai-body" id="aiBody">กดสรุปด้านล่างเพื่อเริ่มดาวน์โหลดสมอง AI ลงเครื่องคอมของคุณ</div>
      <button class="btn mt2" onclick="App.qAI('ช่วยสรุปภาพรวมฐานะการเงินของฉันตอนนี้แบบสั้นกระชับ')">📊 สรุปแผนการเงินด้วยการ์ดจอเครื่องนี้</button>
    </div>`;
  },
  async qAI(q) {
    const body=document.getElementById('aiBody'); if(!body)return;
    const ans = await callAI(q, (progressText) => { body.innerHTML = `<span class="pulse">🤖 ${progressText}</span>`; });
    body.innerHTML = ans.replace(/\n/g,'<br>');
  },
  rAdd() {
    const v=document.getElementById('view-add');
    v.innerHTML=`<div class="amt-display"><div class="num" id="amtD">${this.pend.amount}</div></div>
    <div class="keypad">${[1,2,3,4,5,6,7,8,9,0].map(n=>`<button onclick="App.kp(${n})">${n}</button>`).join('')}<button class="del" onclick="App.kp('del')">⌫</button></div>
    <button class="btn" onclick="App.saveTxn()">✅ บันทึกรายการลงคลาวด์</button>`;
  },
  kp(k){
    let s=String(this.pend.amount); if(k==='del') s=s.slice(0,-1)||'0'; else s+=k;
    this.pend.amount=s; document.getElementById('amtD').textContent=s;
  },
  async saveTxn(){
    DATA.transactions.unshift({id:'t'+Date.now(),date:td(),type:'expense',amount:parseFloat(this.pend.amount),cat:'c_food'});
    this.pend.amount='0'; await pushAll(); this.go('dashboard');
  },
  rSettings() {
    document.getElementById('view-settings').innerHTML=`<div class="card"><h3>👤 บัญชีผู้ใช้</h3><p>ระบบออนไลน์ล็อกอินเสร็จสมบูรณ์ ข้อมูลซิงค์อัตโนมัติ</p></div><button class="btn btn-red mt2" onclick="App.logout()">🚪 ออกจากระบบ</button>`;
  },
  logout(){ localStorage.removeItem(LSK); location.reload(); },
  closeModal(){}
};

async function boot() {
  const saved = localStorage.getItem(LSK);
  if (saved) {
    SESSION = { access_token: JSON.parse(saved).token, user: { id: JSON.parse(saved).uid } };
    await pullAll(); document.getElementById('loadingScreen').style.display='none'; document.getElementById('appWrap').style.display='block';
    if(!DATA.categories.length) Onboard.start(); else App.showApp();
  } else {
    document.getElementById('loadingScreen').style.display='none'; document.getElementById('authScreen').style.display='flex';
  }
}
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
