<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mone-money 💰</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080d1a;--bg2:#0f1629;--bg3:#1a2035;--bg4:#252d42;--pri:#6366f1;--sky:#0ea5e9;--grn:#10b981;--red:#ef4444;--amb:#f59e0b;--txt:#f1f5f9;--dim:#64748b;--dim2:#94a3b8;--bdr:#1a2035;--safe:env(safe-area-inset-bottom,0px)}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Sarabun',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body{max-width:480px;margin:0 auto;position:relative}
#authScreen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px 20px;background:radial-gradient(ellipse at top,rgba(99,102,241,.15) 0%,transparent 60%)}
.auth-logo{font-size:52px;margin-bottom:12px}
.auth-title{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--pri),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--dim);margin-bottom:32px;text-align:center;line-height:1.6}
.auth-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:22px;width:100%;max-width:380px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:12px;padding:4px;margin-bottom:18px}
.auth-tabs button{flex:1;background:transparent;border:none;color:var(--dim);padding:9px;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer}
.auth-tabs button.active{background:var(--pri);color:#fff}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:11px;color:var(--dim2);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.auth-field input{width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);padding:12px 14px;border-radius:11px;font-size:15px;font-family:inherit;outline:none}
.auth-field input:focus{border-color:var(--pri)}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--pri),var(--sky));border:none;color:#fff;padding:13px;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:10px;display:none}
.auth-err.show{display:block}
.auth-err.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.auth-err.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.auth-note{text-align:center;font-size:11px;color:var(--dim);margin-top:12px}
.topbar{position:sticky;top:0;z-index:50;padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;background:rgba(8,13,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr)}
.topbar h1{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--pri),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;gap:8px;align-items:center}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);flex-shrink:0}
.sync-dot.syncing{background:var(--amb);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
.ai-pill{background:linear-gradient(135deg,var(--pri),var(--sky));border:none;color:#fff;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer}
.user-btn{background:var(--bg3);border:1px solid var(--bdr);color:var(--dim2);padding:6px 10px;border-radius:999px;font-size:11px;cursor:pointer}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(15,22,41,.97);backdrop-filter:blur(12px);border-top:1px solid var(--bdr);display:grid;grid-template-columns:repeat(5,1fr);padding:5px 2px calc(5px + var(--safe));z-index:60}
.nb{background:transparent;border:none;color:var(--dim);padding:6px 2px;font-size:9.5px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.nb .ni{font-size:21px;line-height:1}
.nb.active{color:var(--pri)}
.nb.fab .ni{background:linear-gradient(135deg,var(--pri),var(--sky));width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(99,102,241,.5)}
#appWrap{display:none;padding-bottom:calc(68px + var(--safe))}
main{padding:14px}
.view{display:none;animation:fi .18s ease}.view.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ob-wrap{min-height:calc(100vh - 68px);display:flex;flex-direction:column;justify-content:center;padding:20px}
.ob-prog{display:flex;gap:6px;margin-bottom:28px;justify-content:center}
.ob-dot{height:6px;border-radius:3px;background:var(--bg4);transition:all .3s}
.ob-dot.done{background:var(--grn);width:22px}.ob-dot.active{background:var(--pri);width:30px}.ob-dot.todo{width:10px}
.ob-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:8px}
.ob-sub{font-size:13px;color:var(--dim2);text-align:center;margin-bottom:26px;line-height:1.65}
.ob-field{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px}
.ob-field label{display:block;font-size:11px;color:var(--dim2);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.ob-field input{width:100%;background:transparent;border:none;color:var(--txt);font-size:20px;font-weight:700;font-family:inherit;outline:none}
.ob-field .unit{font-size:11px;color:var(--dim);margin-top:3px}
.ob-cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.ob-cat{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s}
.ob-cat .icon{font-size:22px;margin-bottom:4px}
.ob-cat .name{font-size:11px;font-weight:600}
.ob-cat.active{border-color:var(--pri);background:rgba(99,102,241,.18)}
.ob-skip{text-align:center;margin-top:10px}
.ob-skip button{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;text-decoration:underline}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;padding:14px;margin-bottom:11px}
.card-t{font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:10px}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:13px}
.kpi.hero{grid-column:1/-1;background:linear-gradient(135deg,var(--pri),var(--sky));border:none;padding:18px}
.kpi .lbl{font-size:11px;color:var(--dim2);font-weight:500}
.kpi.hero .lbl{color:rgba(255,255,255,.8);font-size:12px}
.kpi .val{font-size:21px;font-weight:800;margin-top:3px}
.kpi.hero .val{font-size:30px;color:#fff}
.kpi .sub{font-size:10px;color:var(--dim);margin-top:3px}
.kpi.hero .sub{color:rgba(255,255,255,.65)}
.c-grn{color:var(--grn)!important}.c-red{color:var(--red)!important}.c-amb{color:var(--amb)!important}
.ai-panel{border-radius:16px;border:1px solid rgba(99,102,241,.3);background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(14,165,233,.06));padding:14px;margin-bottom:11px}
.ai-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ai-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--sky));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-name{font-size:13px;font-weight:700;color:#a5b4fc}
.ai-sub2{font-size:10px;color:var(--dim)}
.ai-body{font-size:13px;line-height:1.75;color:#e2e8f0;min-height:44px}
.ai-body.dim{color:var(--dim);font-style:italic}
.ai-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.ac{background:rgba(99,102,241,.14);border:1px solid rgba(99,102,241,.28);color:#a5b4fc;padding:5px 11px;border-radius:999px;font-size:11px;cursor:pointer}
.ac:active{transform:scale(.96)}
.alert{display:flex;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:7px;border-left:3px solid;font-size:12px;line-height:1.5}
.alert .aico{font-size:18px;flex-shrink:0}
.alert strong{display:block;font-weight:700;margin-bottom:2px}
.alert.danger{background:rgba(239,68,68,.1);border-color:var(--red);color:#fca5a5}
.alert.warning{background:rgba(245,158,11,.1);border-color:var(--amb);color:#fde68a}
.alert.success{background:rgba(16,185,129,.08);border-color:var(--grn);color:#6ee7b7}
.brow{margin-bottom:9px}
.brow .btop{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.prog{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px}
.type-tabs{display:flex;background:var(--bg3);border-radius:12px;padding:4px;margin-bottom:14px}
.type-tabs button{flex:1;background:transparent;border:none;color:var(--dim);padding:10px;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer}
.type-tabs button.active{background:var(--pri);color:#fff}
.type-tabs button.active.inc{background:var(--grn)}
.amt-display{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;padding:20px;margin-bottom:12px;text-align:center}
.amt-display .cur{font-size:12px;color:var(--dim)}
.amt-display .num{font-size:42px;font-weight:800;margin-top:4px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.keypad button{background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);padding:16px;border-radius:12px;font-size:19px;font-weight:700;cursor:pointer}
.keypad button:active{background:var(--bg4);transform:scale(.96)}
.keypad button.del{color:var(--red)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.cbt{background:var(--bg2);border:1.5px solid var(--bdr);color:var(--txt);padding:8px 4px;border-radius:12px;font-size:10px;text-align:center;cursor:pointer;min-height:66px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.cbt .ci{font-size:21px}
.cbt.sel{border-color:var(--pri);background:rgba(99,102,241,.18)}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:var(--dim2);margin-bottom:5px;font-weight:600}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);padding:11px 13px;border-radius:11px;font-size:14px;font-family:inherit;outline:none}
.form-row input:focus,.form-row select:focus{border-color:var(--pri)}
.btn{background:var(--pri);color:#fff;border:none;padding:13px 16px;border-radius:12px;font-weight:700;font-size:14px;width:100%;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-grn{background:var(--grn)}.btn-red{background:var(--red)}.btn-gray{background:var(--bg3);color:var(--txt)}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}.btn-sm{padding:8px 10px;font-size:12px;border-radius:9px}
.txn-item{display:flex;gap:10px;padding:11px 12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;margin-bottom:6px;align-items:center;cursor:pointer}
.txn-item:active{background:var(--bg3)}
.t-ico{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.t-inf{flex:1;min-width:0}
.t-nm{font-size:13px;font-weight:600}
.t-mt{font-size:11px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-amt{font-size:14px;font-weight:800;flex-shrink:0}
.t-amt.exp{color:var(--red)}.t-amt.inc{color:var(--grn)}
.day-hdr{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:8px 4px 4px;font-weight:700}
.dc{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:13px;margin-bottom:9px}
.dc-ttl{font-weight:700;font-size:14px;margin-bottom:8px}
.dc-row{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:4px}
.dc-row strong{color:var(--txt)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:18px 16px calc(20px + var(--safe));max-height:90vh;overflow-y:auto;animation:su .22s ease;position:relative}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:16px;font-weight:800;margin-bottom:14px}
.modal-x{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer}
.chat-box{background:var(--bg3);border-radius:14px;padding:14px;min-height:160px;max-height:300px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:10px}
.msg.user{align-self:flex-end}
.msg.user .bbl{background:linear-gradient(135deg,var(--pri),var(--sky));color:#fff;padding:9px 13px;border-radius:16px 16px 4px 16px;font-size:13px;max-width:82%;line-height:1.5}
.msg.ai .bbl{background:var(--bg2);border:1px solid var(--bdr);padding:9px 13px;border-radius:16px 16px 16px 4px;font-size:13px;max-width:88%;line-height:1.6}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);padding:11px 13px;border-radius:11px;font-size:13px;font-family:inherit;outline:none}
.chat-input-row input:focus{border-color:var(--pri)}
.chat-input-row button{background:linear-gradient(135deg,var(--pri),var(--sky));border:none;color:#fff;padding:11px 15px;border-radius:11px;font-size:18px;cursor:pointer}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--grn);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s,top .2s;white-space:nowrap}
.toast.show{opacity:1;top:80px}
.toast.err{background:var(--red)}
.canvas-wrap{position:relative;height:190px}
.empty{text-align:center;padding:32px 16px;color:var(--dim);font-size:13px}
.ei{font-size:44px;opacity:.35;margin-bottom:8px}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px}
.chip{background:var(--bg2);border:1px solid var(--bdr);color:var(--dim);padding:6px 12px;border-radius:999px;font-size:12px;white-space:nowrap;cursor:pointer}
.chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.flex-sb{display:flex;justify-content:space-between;align-items:center}
.mt2{margin-top:8px}.mb2{margin-bottom:8px}
.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tag{display:inline-block;padding:2px 7px;border-radius:999px;font-size:9px;font-weight:700}
.tag.fix{background:rgba(99,102,241,.15);color:#a5b4fc}
.tag.var{background:rgba(245,158,11,.12);color:#fcd34d}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
  <div style="font-size:48px">💰</div>
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--dim)">กำลังโหลด...</div>
</div>
<div id="authScreen" style="display:none">
  <div class="auth-logo">💰</div>
  <div class="auth-title">Mone-money</div>
  <div class="auth-sub">AI Financial Advisor · ซิงค์ทุกอุปกรณ์</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="active" id="tabLogin" onclick="Auth.showTab('login')">เข้าสู่ระบบ</button>
      <button id="tabRegister" onclick="Auth.showTab('register')">สมัครใหม่</button>
    </div>
    <div class="auth-err" id="authErr"></div>
    <div id="loginForm">
      <div class="auth-field"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')Auth.login()"></div>
      <button class="auth-btn" id="loginBtn" onclick="Auth.login()">🔐 เข้าสู่ระบบ</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="auth-field"><label>ชื่อ</label><input type="text" id="regName" placeholder="ชื่อเล่นของคุณ"></div>
      <div class="auth-field"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="regPass" placeholder="อย่างน้อย 6 ตัว" onkeydown="if(event.key==='Enter')Auth.register()"></div>
      <button class="auth-btn" id="regBtn" onclick="Auth.register()">✨ ส่งคำขอสมัคร</button>
    </div>
    <div class="auth-note">🔒 ข้อมูลเข้ารหัสบน Supabase Cloud</div>
  </div>
</div>
<div id="appWrap" style="display:none">
  <header class="topbar">
    <h1>💰 Mone-money</h1>
    <div class="topbar-right">
      <div class="sync-dot" id="syncDot"></div>
      <button class="ai-pill" onclick="App.openChat()">🤖 Mona AI</button>
      <button class="user-btn" onclick="App.showUserMenu()" id="userBtn">👤</button>
    </div>
  </header>
  <main>
    <div id="onboardArea"></div>
    <div id="appViews" style="display:none">
      <section class="view active" id="view-dashboard"></section>
      <section class="view" id="view-add"></section>
      <section class="view" id="view-txns"></section>
      <section class="view" id="view-debt"></section>
      <section class="view" id="view-settings"></section>
    </div>
  </main>
  <nav class="bnav" id="bnav" style="display:none">
    <button class="nb active" data-tab="dashboard"><span class="ni">📊</span><span>หน้าหลัก</span></button>
    <button class="nb" data-tab="txns"><span class="ni">📋</span><span>รายการ</span></button>
    <button class="nb fab" data-tab="add"><span class="ni">＋</span><span>เพิ่ม</span></button>
    <button class="nb" data-tab="debt"><span class="ni">💳</span><span>หนี้/ผ่อน</span></button>
    <button class="nb" data-tab="settings"><span class="ni">⚙️</span><span>ตั้งค่า</span></button>
  </nav>
</div>
<div class="modal-bg" id="modal"><div class="modal"><button class="modal-x" onclick="App.closeModal()">×</button><div id="mc"></div></div></div>
<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ════════════════════════════════════════════════════
var SB_URL = 'https://oqcvisqguygqtodndsyp.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xY3Zpc3FndXlncXRvZG5kc3lwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjc0MDksImV4cCI6MjA5MzkwMzQwOX0.B-S5C_fNniKyp97aDYkRwGeR4DPEDNSaJHjUWycAxU8';

// ══ SUPABASE ══════════════════════════════════════════════════
var SB = {
  h: function(tok) {
    var h = {'Content-Type':'application/json','apikey':SB_KEY};
    h['Authorization'] = 'Bearer ' + (tok || SB_KEY);
    return h;
  },
  signIn: function(email, pass) {
    return fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:SB.h(),body:JSON.stringify({email:email,password:pass})}).then(function(r){return r.json();});
  },
  getUser: function(tok) {
    return fetch(SB_URL+'/auth/v1/user',{headers:SB.h(tok)}).then(function(r){return r.json();});
  },
  signOut: function(tok) {
    return fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:SB.h(tok)});

// ══ HELPERS ═══════════════════════════════════════════════════
function getToday() { return new Date().toISOString().slice(0,10); }
function mOf(d) { return d.slice(0,7); }
function curM() { return getToday().slice(0,7); }
function fmt(n) { return (n<0?'-':'')+'฿'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0}); }
function gc(id) { return DATA.categories.find(function(c){return c.id===id;}); }
function gi(id) { return DATA.installments.find(function(i){return i.id===id;}); }

function mSum(m) {
  var t = DATA.transactions.filter(function(x){return mOf(x.date)===m;});
  var inc = t.filter(function(x){return x.type==='income';}).reduce(function(s,x){return s+x.amount;},0);
  var exp = t.filter(function(x){return x.type==='expense';}).reduce(function(s,x){return s+x.amount;},0);
  return {inc:inc, exp:exp, net:inc-exp};
}
function calcSavings() {
  var net=0, since=DATA.settings.savingsUpdated;
  DATA.transactions.forEach(function(x){if(x.date>=since)net+=x.type==='income'?x.amount:-x.amount;});
  return (DATA.settings.savings||0)+net;
}
function debtInfo() {
  var rem=0, monthly=0;
  DATA.installments.forEach(function(i){var ml=Math.max(0,i.total-i.paid);rem+=ml*i.monthly;if(ml>0)monthly+=i.monthly;});
  return {rem:rem, monthly:monthly};
}
function byCat(m) {
  var map={};
  DATA.transactions.filter(function(x){return mOf(x.date)===m&&x.type==='expense';}).forEach(function(x){map[x.cat||'c_other']=(map[x.cat||'c_other']||0)+x.amount;});
  return map;
}
function todaySpent() {
  return DATA.transactions.filter(function(x){return x.date===getToday()&&x.type==='expense';}).reduce(function(s,x){return s+x.amount;},0);
}
function localRisk() {
  var al=[], s=mSum(curM()), sav=calcSavings(), debt=debtInfo();
  var ratio=(debt.monthly/(DATA.settings.income||1))*100;
  if(s.exp>s.inc&&(s.inc||s.exp))al.push({sev:'danger',icon:'🔻',title:'รายจ่ายเกินรายรับ',body:'เกินมา '+fmt(s.exp-s.inc)});
  var dod=new Date().getDate();
  if(s.exp>0&&(s.exp/dod*14)>sav*0.3&&sav>0)al.push({sev:'warning',icon:'🔮',title:'ความเสี่ยงสภาพคล่อง 14 วัน',body:'คาดใช้เพิ่ม '+fmt(s.exp/dod*14)});
  var avg=0,cnt=0;
  for(var i=1;i<=3;i++){var d=new Date(new Date().getFullYear(),new Date().getMonth()-i,1);var ms=mSum(d.toISOString().slice(0,7));if(ms.exp>0){avg+=ms.exp;cnt++;}}
  var target=(cnt?avg/cnt:DATA.settings.income*0.7)*DATA.settings.safetyMonths;
  if(sav<target&&target>0)al.push({sev:'warning',icon:'⚠️',title:'เงินสำรองต่ำ',body:'ควรมี '+fmt(target)+' มีแค่ '+fmt(sav)});
  if(ratio>DATA.settings.debtThreshold)al.push({sev:'danger',icon:'💳',title:'ภาระหนี้สูง',body:ratio.toFixed(0)+'% ของรายได้'});
  return al;
}

// ══ SYNC ══════════════════════════════════════════════════════
function setSyncStatus(s) {
  var d=document.getElementById('syncDot');
  if(!d)return;
  d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
}
function pushAll() {
  if(!SESSION)return Promise.resolve();
  setSyncStatus('syncing');
  return SB.upsert('mm_profiles',{id:SESSION.user.id,name:PROFILE?PROFILE.name:'',settings:DATA.settings,categories:DATA.categories,ai_log:DATA.aiLog.slice(-30),updated_at:new Date().toISOString()},SESSION.access_token)
    .then(function(){
      var txns=DATA.transactions.slice(0,300).map(function(t){return Object.assign({},t,{user_id:SESSION.user.id});});
      if(txns.length)return SB.upsert('mm_transactions',txns,SESSION.access_token);
    })
    .then(function(){
      var insts=DATA.installments.map(function(i){return Object.assign({},i,{user_id:SESSION.user.id});});
      if(insts.length)return SB.upsert('mm_installments',insts,SESSION.access_token);
    })
    .then(function(){setSyncStatus('ok');})
    .catch(function(){setSyncStatus('error');});
}
function pullAll() {
  if(!SESSION)return Promise.resolve();
  setSyncStatus('syncing');
  return SB.select('mm_profiles','id=eq.'+SESSION.user.id,SESSION.access_token)
    .then(function(rows){
      if(rows&&rows[0]){var p=rows[0];PROFILE={name:p.name};if(p.settings)DATA.settings=p.settings;if(p.categories&&p.categories.length)DATA.categories=p.categories;if(p.ai_log)DATA.aiLog=p.ai_log;}
      return SB.select('mm_transactions','user_id=eq.'+SESSION.user.id+'&order=date.desc&limit=500',SESSION.access_token);
    })
    .then(function(txns){
      if(Array.isArray(txns)&&txns.length)DATA.transactions=txns.map(function(t){var r=Object.assign({},t);delete r.user_id;return r;});
      return SB.select('mm_installments','user_id=eq.'+SESSION.user.id,SESSION.access_token);
    })
    .then(function(insts){
      if(Array.isArray(insts)&&insts.length)DATA.installments=insts.map(function(i){var r=Object.assign({},i);delete r.user_id;return r;});
      setSyncStatus('ok');
    })
    .catch(function(){setSyncStatus('error');});
}
function schedulePush(){clearTimeout(syncTimer);syncTimer=setTimeout(pushAll,1500);}

// ══ AI — Pollinations.ai (Free · No API Key) ══════════════════
function buildSys() {
  var s=mSum(curM()), sav=calcSavings(), debt=debtInfo(), bc=byCat(curM()), al=localRisk();
  var top=Object.entries(bc).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){return (gc(e[0])?gc(e[0]).name:e[0])+': '+fmt(e[1]);}).join(' | ');
  return 'คุณคือ "Mona" AI ที่ปรึกษาการเงินส่วนตัว พูดภาษาไทย เป็นกันเอง ฉลาด ให้คำแนะนำที่ปฏิบัติได้จริง\n📊 ข้อมูลการเงิน: ชื่อ: '+(PROFILE?PROFILE.name:'ผู้ใช้')+' | รายรับ: '+fmt(s.inc)+' | รายจ่าย: '+fmt(s.exp)+' | เงินเก็บ: '+fmt(sav)+' | หนี้: '+fmt(debt.rem)+' | ผ่อน/เดือน: '+fmt(debt.monthly)+' | รายจ่ายสูงสุด: '+(top||'ยังไม่มี')+' | เตือน: '+(al.length?al.map(function(a){return a.title;}).join(', '):'ไม่มี')+'\nตอบกระชับ เจาะจง ใช้ตัวเลขจริง แนะนำสิ่งที่ทำได้ทันที';
}

function callAI(msg, history) {
  history = history || [];
  var messages = [{role:'system',content:buildSys()}];
  history.slice(-6).forEach(function(m){messages.push({role:m.role==='user'?'user':'assistant',content:m.content});});
  messages.push({role:'user',content:msg});
  return fetch('https://text.pollinations.ai/',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:messages,model:'openai',private:true})
  })
  .then(function(r){if(!r.ok)return'เกิดข้อผิดพลาด กรุณาลองใหม่';return r.text();})
  .catch(function(){return'ไม่สามารถเชื่อมต่อ AI ได้';});
}

    document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
    var el=document.getElementById('view-'+tab);
    if(el)el.classList.add('active');
    document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});
    window.scrollTo({top:0,behavior:'instant'});
    App.render();
  },

  render: function(){
    if(App.tab==='dashboard')App.rDash();
    else if(App.tab==='add')App.rAdd();
    else if(App.tab==='txns')App.rTxns();
    else if(App.tab==='debt')App.rDebt();
    else if(App.tab==='settings')App.rSettings();
  },

  dashChat: function(){
    var inp=document.getElementById('dashIn');
    var q=inp&&inp.value.trim(); if(!q)return; inp.value='';
    App.qAI(q);
  },

  qAI: function(q){
    var body=document.getElementById('aiBody'), sub=document.getElementById('aiSub');
    if(!body)return;
    body.innerHTML='<span class="pulse">🤖 Mona กำลังวิเคราะห์...</span>';
    body.className='ai-body dim';
    if(sub)sub.textContent='กำลังประมวลผล...';
    var history=DATA.aiLog.slice(-6).map(function(m){return{role:m.role==='user'?'user':'assistant',content:m.content};});
    callAI(q,history).then(function(ans){
      DATA.aiLog.push({role:'user',content:q},{role:'assistant',content:ans});
      if(DATA.aiLog.length>30)DATA.aiLog=DATA.aiLog.slice(-30);
      schedulePush();
      body.innerHTML=ans.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
      body.className='ai-body';
      if(sub)sub.textContent='วิเคราะห์เสร็จแล้ว ✓';
    });
  },

  rCharts: function(){
    Object.values(App.charts).forEach(function(c){if(c)c.destroy();}); App.charts={};
    Chart.defaults.color='#64748b'; Chart.defaults.borderColor='#1a2035'; Chart.defaults.font.family='inherit';
    var now=new Date(), labels=[], inc=[], exp=[];
    for(var i=5;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);var ms=mSum(d.toISOString().slice(0,7));labels.push(d.toLocaleDateString('th-TH',{month:'short',year:'2-digit'}));inc.push(ms.inc);exp.push(ms.exp);}
    var fc=document.getElementById('flowChart');
    if(fc)App.charts.flow=new Chart(fc,{type:'bar',data:{labels:labels,datasets:[{label:'รายรับ',data:inc,backgroundColor:'rgba(16,185,129,.75)',borderRadius:5},{label:'รายจ่าย',data:exp,backgroundColor:'rgba(239,68,68,.75)',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:function(v){return v>=1000?(v/1000).toFixed(0)+'K':v;}},grid:{color:'#1a2035'}},x:{grid:{display:false}}},plugins:{legend:{labels:{boxWidth:10,font:{size:11}}},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+fmt(c.parsed.y);}}}}}});
    var bc=byCat(curM()), pal=['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
    var items=Object.entries(bc).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
    var cc=document.getElementById('catChart');
    if(cc&&items.length)App.charts.cat=new Chart(cc,{type:'doughnut',data:{labels:items.map(function(e){return gc(e[0])?gc(e[0]).name:e[0];}),datasets:[{data:items.map(function(e){return e[1];}),backgroundColor:items.map(function(e,i){return pal[i%pal.length];}),borderColor:'#0f1629',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:10,padding:6,font:{size:10}}},tooltip:{callbacks:{label:function(c){return c.label+': '+fmt(c.parsed);}}}}}});
    else if(cc)cc.parentElement.innerHTML='<div class="empty"><div class="ei">📊</div>บันทึกรายจ่ายแรกได้เลย!</div>';
  },

  rAdd: function(){
    var v=document.getElementById('view-add'), p=App.pend;
    var h='<div class="type-tabs"><button class="'+(p.type==='expense'?'active':'')+'" onclick="App.setType(\'expense\')">💸 รายจ่าย</button><button class="'+(p.type==='income'?'active inc':'')+'" onclick="App.setType(\'income\')">💵 รายรับ</button></div>'
      +'<div class="amt-display"><div class="cur">บาท (THB)</div><div class="num" id="amtD">'+p.amount+'</div></div>'
      +'<div class="keypad">'+[1,2,3,4,5,6,7,8,9].map(function(n){return '<button onclick="App.kp('+n+')">'+n+'</button>';}).join('')
        +'<button onclick="App.kp(\'.\')">.</button><button onclick="App.kp(0)">0</button><button class="del" onclick="App.kp(\'del\')">⌫</button></div>';
    if(p.type==='expense'){
      h+='<div style="font-size:11px;color:var(--dim2);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">เลือกหมวดหมู่</div><div class="cat-grid">';
      DATA.categories.forEach(function(c){h+='<button class="cbt '+(p.cat===c.id?'sel':'')+'" onclick="App.selCat(\''+c.id+'\')"><span class="ci">'+c.icon+'</span><span>'+c.name+'</span></button>';});
      h+='</div><div class="form-row"><label>วิธีชำระ</label><select onchange="App.pend.method=this.value"><option value="cash">💵 เงินสด</option><option value="credit">💳 บัตรเครดิต</option><option value="transfer">📲 โอน</option></select></div>';
    }else{
      h+='<div class="form-row"><label>แหล่งรายรับ</label><select onchange="App.pend.source=this.value"><option value="salary">💼 เงินเดือน</option><option value="bonus">🎁 โบนัส</option><option value="side">💡 รายได้เสริม</option><option value="other">📦 อื่นๆ</option></select></div>';
    }
    h+='<div class="form-row"><label>วันที่</label><input type="date" value="'+p.date+'" onchange="App.pend.date=this.value"></div>'
      +'<div class="form-row"><label>บันทึก</label><textarea rows="2" oninput="App.pend.note=this.value">'+p.note+'</textarea></div>'
      +'<button class="btn '+(p.type==='income'?'btn-grn':'')+'" onclick="App.saveTxn()">✅ บันทึกรายการ</button>';
    v.innerHTML=h;
  },
  setType: function(t){App.pend.type=t;App.pend.cat=null;App.rAdd();},
  selCat: function(id){App.pend.cat=id;App.rAdd();},
  kp: function(k){
    var s=String(App.pend.amount);
    if(s==='0')s='';
    if(k==='del')s=s.slice(0,-1)||'0';
    else if(k==='.'){if(!s.includes('.'))s+=s?'.':'0.';}
    else s+=k;
    if(!s)s='0';
    App.pend.amount=s;
    var el=document.getElementById('amtD'); if(el)el.textContent=s;
  },
  saveTxn: function(){
    var p=App.pend, amt=parseFloat(p.amount);
    if(!amt||amt<=0){App.toast('กรุณาใส่จำนวนเงิน','err');return;}
    if(p.type==='expense'&&!p.cat){App.toast('กรุณาเลือกหมวดหมู่','err');return;}
    DATA.transactions.unshift({id:'t'+Date.now(),date:p.date,type:p.type,amount:amt,cat:p.type==='expense'?p.cat:null,source:p.type==='income'?p.source:null,method:p.type==='expense'?p.method:null,note:p.note||''});
    App.pend={type:'expense',amount:'0',cat:null,date:getToday(),note:'',method:'cash',source:'salary'};
    App.toast('บันทึกแล้ว ✓'); schedulePush(); App.go('dashboard');
  },

  rTxns: function(){
    var v=document.getElementById('view-txns');
    var txns=DATA.transactions.slice();
    if(App.txnFilter!=='all')txns=txns.filter(function(x){return x.type===App.txnFilter;});
    txns.sort(function(a,b){return b.date.localeCompare(a.date);});
    var h='<div class="filters"><button class="chip '+(App.txnFilter==='all'?'active':'')+'" onclick="App.txnFilter=\'all\';App.rTxns()">ทั้งหมด</button><button class="chip '+(App.txnFilter==='expense'?'active':'')+'" onclick="App.txnFilter=\'expense\';App.rTxns()">💸 รายจ่าย</button><button class="chip '+(App.txnFilter==='income'?'active':'')+'" onclick="App.txnFilter=\'income\';App.rTxns()">💵 รายรับ</button></div>';
    if(!txns.length)h+='<div class="empty"><div class="ei">📭</div>ยังไม่มีรายการ</div>';
    else{
      var lastD='';
      txns.forEach(function(x){
        if(x.date!==lastD){h+='<div class="day-hdr">'+App.dlabel(x.date)+'</div>';lastD=x.date;}
        var cat=x.cat?gc(x.cat):null;
        var icon=cat?cat.icon:(x.type==='income'?'💵':'🔖');
        var name=cat?cat.name:(x.type==='income'?'รายรับ':'อื่นๆ');
        h+='<div class="txn-item" onclick="App.delTxn(\''+x.id+'\')"><div class="t-ico">'+icon+'</div><div class="t-inf"><div class="t-nm">'+name+'</div><div class="t-mt">'+(x.note||'&nbsp;')+'</div></div><div class="t-amt '+(x.type==='expense'?'exp':'inc')+'">'+(x.type==='expense'?'-':'+')+fmt(x.amount)+'</div></div>';
      });
    }
    v.innerHTML=h;
  },
  dlabel: function(d){
    var t2=getToday(), y=new Date(); y.setDate(y.getDate()-1);
    if(d===t2)return'📅 วันนี้'; if(d===y.toISOString().slice(0,10))return'📅 เมื่อวาน';
    return new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
  },
  delTxn: function(id){
    if(!confirm('ลบรายการนี้?'))return;
    DATA.transactions=DATA.transactions.filter(function(x){return x.id!==id;});
    SB.del('mm_transactions',id,SESSION&&SESSION.access_token); schedulePush(); App.rTxns();
  },

  rDebt: function(){
    var v=document.getElementById('view-debt'), debt=debtInfo();
    var ratio=((debt.monthly/(DATA.settings.income||1))*100).toFixed(0);
    var h='<div class="kgrid"><div class="kpi"><div class="lbl">หนี้คงเหลือทั้งหมด</div><div class="val c-amb">'+fmt(debt.rem)+'</div></div><div class="kpi"><div class="lbl">ผ่อน/เดือน ('+ratio+'%)</div><div class="val '+(+ratio>DATA.settings.debtThreshold?'c-red':'')+'">'+fmt(debt.monthly)+'</div></div></div>'
      +'<button class="btn mb2" onclick="App.openInstModal()">＋ เพิ่มรายการผ่อน</button>';
    if(!DATA.installments.length)h+='<div class="empty"><div class="ei">💳</div>ยังไม่มีรายการผ่อน</div>';
    else DATA.installments.forEach(function(inst){
      var ml=Math.max(0,inst.total-inst.paid), remAmt=ml*inst.monthly;
      var pct=inst.total>0?Math.min(100,(inst.paid/inst.total)*100):0, done=ml===0;
      var payoff=ml>0?(function(){var d=new Date();d.setMonth(d.getMonth()+ml);return d.toLocaleDateString('th-TH',{month:'long',year:'numeric'});})():'';
      h+='<div class="dc"><div class="dc-ttl">'+inst.name+(done?' <span style="color:var(--grn);font-size:11px">🎉 จ่ายครบ!</span>':'')+'</div>'
        +'<div class="dc-row"><span>ผ่อน/เดือน</span><strong>'+fmt(inst.monthly)+'</strong></div>'
        +'<div class="dc-row"><span>คงเหลือ</span><strong>'+fmt(remAmt)+'</strong></div>'
        +'<div class="dc-row"><span>งวด</span><strong>'+inst.paid+'/'+inst.total+' (เหลือ '+ml+')</strong></div>'
        +(payoff?'<div class="dc-row"><span>จะหมดเมื่อ</span><strong>'+payoff+'</strong></div>':'')
        +'<div class="prog" style="margin:8px 0 4px"><div class="pf" style="width:'+pct+'%;background:'+(done?'var(--grn)':'linear-gradient(90deg,var(--pri),var(--sky))')+'"></div></div>'
        +'<div style="font-size:10px;color:var(--dim)">ความคืบหน้า '+pct.toFixed(0)+'%</div>'
        +'<div class="btn-row mt2">'+(done?'':'<button class="btn btn-grn btn-sm" onclick="App.payInst(\''+inst.id+'\')">✅ จ่ายงวด</button>')
        +'<button class="btn btn-gray btn-sm" onclick="App.openInstModal(\''+inst.id+'\')">✏️ แก้ไข</button>'
        +'<button class="btn btn-red btn-sm" onclick="App.delInst(\''+inst.id+'\')">🗑️</button></div></div>';
    });
    v.innerHTML=h;
  },
  payInst: function(id){
    var i=gi(id); if(!i||i.paid>=i.total)return;
    i.paid++;
    DATA.transactions.unshift({id:'t'+Date.now(),date:getToday(),type:'expense',amount:i.monthly,cat:'c_other',source:null,method:'transfer',note:'จ่ายงวด: '+i.name});
    App.toast('จ่ายงวดแล้ว ✓'); schedulePush(); App.rDebt();
  },
  delInst: function(id){
    if(!confirm('ลบรายการนี้?'))return;
    DATA.installments=DATA.installments.filter(function(i){return i.id!==id;});
    SB.del('mm_installments',id,SESSION&&SESSION.access_token); schedulePush(); App.rDebt();
  },
  openInstModal: function(id){
    var i=id?gi(id):null, m=i||{name:'',monthly:0,total:12,paid:0,start:getToday()};
    App.openModal('<h3>'+(i?'แก้ไข':'เพิ่ม')+'รายการผ่อน</h3>'
      +'<div class="form-row"><label>ชื่อรายการ</label><input id="iN" value="'+(m.name||'')+'" placeholder="เช่น ผ่อนบ้าน"></div>'
      +'<div class="form-row"><label>ผ่อน/เดือน (฿)</label><input id="iM" type="number" value="'+(m.monthly||'')+'"></div>'
      +'<div class="form-row"><label>จำนวนงวดทั้งหมด</label><input id="iT" type="number" value="'+m.total+'"></div>'
      +'<div class="form-row"><label>งวดที่จ่ายแล้ว</label><input id="iP" type="number" value="'+m.paid+'"></div>'
      +'<div class="form-row"><label>วันที่เริ่ม</label><input id="iS" type="date" value="'+m.start+'"></div>'
      +'<button class="btn" onclick="App.saveInst(\''+(id||'')+'\')">💾 บันทึก</button>');
  },
  saveInst: function(id){
    var name=document.getElementById('iN').value.trim();
    var monthly=parseFloat(document.getElementById('iM').value)||0;
    var total=parseInt(document.getElementById('iT').value)||1;
    var paid=parseInt(document.getElementById('iP').value)||0;
    var start=document.getElementById('iS').value||getToday();
    if(!name){App.toast('กรุณาใส่ชื่อ','err');return;}
    if(id){Object.assign(gi(id),{name:name,monthly:monthly,total:total,paid:paid,start:start});}
    else{DATA.installments.push({id:'i'+Date.now(),name:name,monthly:monthly,total:total,paid:paid,start:start});}
    schedulePush(); App.closeModal(); App.rDebt();
  },

      +'<div class="card-t mt2 mb2">🏷️ หมวดหมู่ ('+DATA.categories.length+' หมวด)</div>'
      +'<button class="btn btn-gray mb2" onclick="App.openCatModal()">＋ เพิ่มหมวดหมู่</button>'
      +'<div class="card">'+DATA.categories.map(function(c){return '<div class="flex-sb" style="padding:9px 0;border-bottom:1px solid var(--bdr)"><div>'+c.icon+' <strong>'+c.name+'</strong> <span class="tag '+c.type+'">'+(c.type==='fix'?'คงที่':'ผันแปร')+'</span><div style="font-size:10px;color:var(--dim);margin-top:2px">งบ '+fmt(c.budget)+'/เดือน</div></div><div style="display:flex;gap:6px"><button class="btn btn-gray btn-sm" style="width:auto;padding:5px 9px" onclick="App.openCatModal(\''+c.id+'\')">✏️</button><button class="btn btn-red btn-sm" style="width:auto;padding:5px 9px" onclick="App.delCat(\''+c.id+'\')">×</button></div></div>';}).join('')+'</div>'
      +'<div class="card-t mt2 mb2">🔐 บัญชีผู้ใช้</div>'
      +'<div class="card mb2"><strong>'+(SESSION&&SESSION.user?SESSION.user.email:'-')+'</strong><div style="font-size:11px;color:var(--grn);margin-top:4px">☁️ ซิงค์กับ Supabase Cloud · AI by Pollinations.ai</div></div>'
      +'<button class="btn btn-red" onclick="App.logout()">🚪 ออกจากระบบ</button>'
      +'<div style="text-align:center;color:var(--dim);font-size:10px;padding:18px 0 4px">Mone-money v5.1 · Free AI · No API Key</div>';
  },
  saveSettings: function(){
    DATA.settings.income=parseFloat(document.getElementById('sInc').value)||0;
    DATA.settings.savings=parseFloat(document.getElementById('sSav').value)||0;
    DATA.settings.safetyMonths=parseInt(document.getElementById('sSafe').value)||3;
    DATA.settings.debtThreshold=parseFloat(document.getElementById('sRatio').value)||40;
    DATA.settings.savingsUpdated=getToday();
    pushAll().then(function(){App.toast('บันทึกและซิงค์แล้ว ✓'); App.rSettings();});
  },
  openCatModal: function(id){
    var c=id?gc(id):null, m=c||{name:'',icon:'🔖',type:'var',budget:0};
    App.openModal('<h3>'+(c?'แก้ไข':'เพิ่ม')+'หมวดหมู่</h3>'
      +'<div class="form-row"><label>Icon (emoji)</label><input id="cI" value="'+m.icon+'" maxlength="4"></div>'
      +'<div class="form-row"><label>ชื่อ</label><input id="cN" value="'+m.name+'"></div>'
      +'<div class="form-row"><label>ประเภท</label><select id="cT"><option value="var" '+(m.type==='var'?'selected':'')+'>ผันแปร</option><option value="fix" '+(m.type==='fix'?'selected':'')+'>คงที่</option></select></div>'
      +'<div class="form-row"><label>งบ/เดือน (฿)</label><input id="cB" type="number" value="'+(m.budget||0)+'"></div>'
      +'<button class="btn" onclick="App.saveCat(\''+(id||'')+'\')">💾 บันทึก</button>');
  },
  saveCat: function(id){
    var name=document.getElementById('cN').value.trim();
    var icon=document.getElementById('cI').value.trim()||'🔖';
    var type=document.getElementById('cT').value;
    var budget=parseFloat(document.getElementById('cB').value)||0;
    if(!name){App.toast('กรุณาใส่ชื่อ','err');return;}
    if(id){Object.assign(gc(id),{name:name,icon:icon,type:type,budget:budget});}
    else{DATA.categories.push({id:'c'+Date.now(),name:name,icon:icon,type:type,budget:budget});}
    pushAll().then(function(){App.closeModal(); App.rSettings();});
  },
  delCat: function(id){
    if(!confirm('ลบหมวดนี้?'))return;
    DATA.categories=DATA.categories.filter(function(c){return c.id!==id;});
    pushAll().then(function(){App.rSettings();});
  },
  logout: function(){
    if(!confirm('ออกจากระบบ?'))return;
    if(SESSION)SB.signOut(SESSION.access_token);
    localStorage.removeItem(LSK); location.reload();
  },

  openChat: function(){
    var msgs=DATA.aiLog;
    var ch=msgs.map(function(m){return '<div class="msg '+(m.role==='user'?'user':'ai')+'"><div class="bbl">'+m.content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')+'</div></div>';}).join('');
    if(!ch)ch='<div class="msg ai"><div class="bbl">สวัสดีครับ! ถามเรื่องการเงินได้เลยครับ 😊</div></div>';
    App.openModal('<h3>🤖 คุยกับ Mona AI</h3>'
      +'<div class="chat-box" id="chatBox">'+ch+'</div>'
      +'<div class="ai-chips" style="margin-bottom:10px">'
        +'<button class="ac" onclick="App.chatSend(\'วิเคราะห์การเงินเดือนนี้\')">📊 เดือนนี้</button>'
        +'<button class="ac" onclick="App.chatSend(\'แนะนำลดรายจ่าย\')">✂️ ลดรายจ่าย</button>'
        +'<button class="ac" onclick="App.chatSend(\'สภาพคล่อง 14 วัน\')">🔮 14 วัน</button>'
        +'<button class="ac" onclick="App.chatSend(\'แผนออมเงิน\')">🏦 ออมเงิน</button>'
      +'</div>'
      +'<div class="chat-input-row"><input id="chatIn" placeholder="ถามเรื่องการเงิน..." onkeydown="if(event.key===\'Enter\')App.chatSend()"><button onclick="App.chatSend()">➤</button></div>');
    var box=document.getElementById('chatBox'); if(box)box.scrollTop=box.scrollHeight;
  },
  chatSend: function(preset){
    var inp=document.getElementById('chatIn');
    var q=preset||(inp&&inp.value.trim()); if(!q)return; if(inp)inp.value='';
    var box=document.getElementById('chatBox');
    if(box){box.innerHTML+='<div class="msg user"><div class="bbl">'+q+'</div></div><div class="msg ai" id="typing"><div class="bbl"><span class="pulse">🤖 กำลังคิด...</span></div></div>';box.scrollTop=box.scrollHeight;}
    DATA.aiLog.push({role:'user',content:q});
    var history=DATA.aiLog.slice(-10).map(function(m){return{role:m.role==='user'?'user':'assistant',content:m.content};});
    callAI(q,history).then(function(ans){
      DATA.aiLog.push({role:'assistant',content:ans});
      if(DATA.aiLog.length>40)DATA.aiLog=DATA.aiLog.slice(-40);
      schedulePush();
      var typing=document.getElementById('typing');
      if(typing)typing.querySelector('.bbl').innerHTML=ans.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
      if(box)box.scrollTop=box.scrollHeight;
    });
  },
  showUserMenu: function(){
    App.openModal('<h3>👤 บัญชีของคุณ</h3>'
      +'<div style="background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:14px">'
        +'<div style="font-weight:700;font-size:15px">'+(PROFILE&&PROFILE.name||'ผู้ใช้')+'</div>'
        +'<div style="font-size:12px;color:var(--dim);margin-top:3px">'+(SESSION&&SESSION.user?SESSION.user.email:'')+'</div>'
        +'<div style="font-size:11px;color:var(--grn);margin-top:6px">☁️ ซิงค์กับ Supabase</div>'
      +'</div>'
      +'<button class="btn btn-gray mb2" onclick="pushAll().then(function(){App.toast(\'ซิงค์แล้ว ✓\')});App.closeModal()">🔄 ซิงค์เดี๋ยวนี้</button>'
      +'<button class="btn btn-red" onclick="App.logout()">🚪 ออกจากระบบ</button>');
  },
  openModal: function(html){document.getElementById('mc').innerHTML=html;document.getElementById('modal').classList.add('open');},
  closeModal: function(){document.getElementById('modal').classList.remove('open');},
  toast: function(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='toast'+(type==='err'?' err':'')+' show';setTimeout(function(){el.classList.remove('show');},2200);}
};

// ══ BOOT ══════════════════════════════════════════════════════
function boot() {
  try {
    var saved = localStorage.getItem(LSK);
    if (saved) {
      var token = JSON.parse(saved).token;
      SB.getUser(token).then(function(userRes) {
        if (userRes.id && !userRes.error) {
          SESSION = {access_token: token, user: userRes};
          PROFILE = {name: (userRes.user_metadata && userRes.user_metadata.name) || userRes.email.split('@')[0] || ''};
          pullAll().then(function() {
            document.getElementById('loadingScreen').style.display='none';
            document.getElementById('appWrap').style.display='block';
            var uBtn=document.getElementById('userBtn');
            if(uBtn)uBtn.textContent=(PROFILE.name||'👤').slice(0,6);
            if(!DATA.categories.length)Onboard.start();
            else App.showApp();
          });
        } else {
          showAuth();
        }
      }).catch(function(){showAuth();});
    } else {
      showAuth();
    }
  } catch(e) {
    showAuth();
  }
}

function showAuth() {
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}

document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
